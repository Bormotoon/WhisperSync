name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python is >=3.10 (pyproject.toml); 3.14 is the version this
        # project is actively developed on. Cover the full supported span, not
        # just the middle of it.
        python-version: ["3.10", "3.11", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PyQt6 needs the Qt runtime's system libraries even under the offscreen
      # platform plugin (importing QtWidgets dlopens libEGL/libGL); bare GitHub
      # runners don't ship them all. Without this, pytest fails at COLLECTION
      # (test modules import whispersync.gui), not just in GUI tests.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install dependencies (locked on 3.12 for reproducibility; ranges elsewhere)
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            pip install -r requirements-dev.lock
          else
            pip install -r requirements-dev.txt
          fi

      - name: Ruff (lint)
        run: ruff check whispersync/ tools/ tests/

      - name: Black (format check)
        run: black --check whispersync/ tools/ tests/

      - name: Mypy (type check)
        run: mypy whispersync/ tools/ main.py

      - name: Pytest (excluding ffmpeg integration tests)
        run: pytest -q -m "not integration"

  integration:
    name: Integration tests (real ffmpeg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ffmpeg for the integration tests themselves; Qt runtime libs because
      # pytest imports every test module during collection (incl. GUI tests).
      - name: Install ffmpeg and Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock

      - name: Pytest (ffmpeg integration tests only)
        run: pytest -q -m integration
